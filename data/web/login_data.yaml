  - case: "密码为空"
    username: "17111111114"
    password: ""
    expected_error: "请输入密码"  # 根据实际错误提示修改

  - case: "不存在的用户"
    username: "99999999999"  # 不存在的账号
    password: "any_password"
    expected_error: "用户不存在"  # 根据实际错误提示修改