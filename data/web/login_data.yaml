valid:
  username: "17111111114"  # 你的测试账号
  password: "caotuli8"     # 你的测试密码

# 无效登录用例
invalid:
  - case: "密码错误"
    username: "17111111114"  # 有效用户名
    password: "wrong_password"
    expected_error: "用户名或密码错误"  # 根据实际错误提示修改

  - case: "用户名为空"
    username: ""
    password: "any_password"
